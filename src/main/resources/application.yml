server:
  port: 8090
  servlet:
    context-path: /api/v1
spring:
  application:
    name: "Jobzy"
  profiles:
    default: ${SPRING_PROFILES_ACTIVE:default}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        completions-path: v1/chat/completions
        options:
          model: gpt-5.2

logging:
  level:
    com.jobly_jobs: ${LOGGING_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOGGING_LEVEL_SPRING_WEB:INFO}
    org.hibernate: ${LOGGING_LEVEL_HIBERNATE:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
