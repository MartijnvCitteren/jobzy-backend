openapi: 3.1.1
info:
  title: Jobzy Vacancy API
  description: >
    API for managing vacancies in Jobzy. This endpoint covers creating (partially AI generated) vacancies, publishing, 
    updating and fetching vacancies.
  version: 1.0.0
servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: Vacancy
    description: >
      Vacancy resource lifecycle: staged creation, partial updates, status transitions, soft
      delete, and the internal owner-dashboard listing.

paths:
  /vacancy:
    post:
      operationId: createVacancy
      tags: [Vacancy]
      summary: Create a vacancy
      description: >
        Creates a new vacancy in `DRAFT` status from the core section only (job title, category,
        location, workplace type, hours per week). Description, contact person, and offer details
        are added afterwards via `PATCH /vacancy/{id}`, matching the staged/AI-assisted creation
        flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyCoreRequest'
      responses:
        '201':
          description: Vacancy created.
          headers:
            Location:
              description: URL of the newly created vacancy.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vacancy/{id}/generate-description:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      operationId: generateVacancyDescription
      tags: [ Vacancy ]
      summary: Start an AI-assisted vacancy description generation
      description: >
        Starts an asynchronous generation of a draft `description` (summary, job description,
        tasks, what we offer, about us) for an existing vacancy from a few short inputs. Generation
        runs against an external AI provider and is not guaranteed to complete within a single
        request/response cycle, so this endpoint only starts the job and returns a `generationId`
        immediately. Poll `GET /vacancy/{id}/generate-description/{generationId}` until `status` is
        `COMPLETED` (or `FAILED`) to retrieve the draft. The result is a suggestion only and is
        never persisted automatically — the client shows it to the user for editing and only then
        submits the (possibly edited) result via `PATCH /vacancy/{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateVacancyDescriptionRequest'
      responses:
        '202':
          description: Generation started.
          headers:
            Location:
              description: URL to poll for the generation result.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDescriptionGeneration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'


    get:
      operationId: listVacancies
      tags: [Vacancy]
      summary: List vacancies (internal, authenticated)
      description: >
        Internal owner-dashboard listing across all statuses, including `DRAFT`. This endpoint is
        authenticated and must never be exposed to anonymous candidates — it is not the public job
        board. A separate `GET /public/vacancy` (implicitly filtered to `PUBLISHED`) is deferred
        until the public job board is actually built.


        Uses keyset/cursor pagination on `id` (UUIDv7, time-ordered), which scales better than
        offset pagination and is the natural fit for a time-ordered identifier.
      parameters:
        - $ref: '#/components/parameters/JobTitleFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/CategoryFilter'
        - $ref: '#/components/parameters/CreatedFrom'
        - $ref: '#/components/parameters/CreatedTo'
        - $ref: '#/components/parameters/OpenDaysMin'
        - $ref: '#/components/parameters/OpenDaysMax'
        - $ref: '#/components/parameters/ContactPersonName'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Page of vacancies matching the filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'



  /vacancy/{id}/generate-description/{generationId}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
      - $ref: '#/components/parameters/GenerationId'
    get:
      operationId: getVacancyDescriptionGeneration
      tags: [Vacancy]
      summary: Poll the status of a description generation job
      description: >
        Returns the current status of a description-generation job started via
        `POST /vacancy/{id}/generate-description`. `description` is present only once `status` is
        `COMPLETED`.
      responses:
        '200':
          description: Current generation status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyDescriptionGeneration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vacancy/{id}:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    patch:
      operationId: updateVacancy
      tags: [Vacancy]
      summary: Partially update a vacancy
      description: >
        Applies a partial update following **JSON Merge Patch semantics (RFC 7396)**: a field
        present in the request body replaces the current value, a field omitted from the body is
        left untouched, and a field explicitly set to `null` clears it (only where the underlying
        field is nullable — see `Vacancy` schema). Any combination of the core fields, `description`,
        `contactPerson`, and `offer` may be sent in a single request; the client sends whichever
        section(s) it currently has.


        Status is never changed through this endpoint — use the dedicated transition endpoints
        (`/publish`, `/fill`, `/close`) instead, since each transition has its own legality rules
        and side effects.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/VacancyUpdateRequest'
      responses:
        '200':
          description: Updated vacancy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: getVacancy
      tags: [Vacancy]
      summary: Fetch a single vacancy
      responses:
        '200':
          description: The requested vacancy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteVacancy
      tags: [Vacancy]
      summary: Soft-delete a vacancy
      description: >
        Soft delete only — sets `status=ARCHIVED` and stamps `deletedAt`. Never performs a hard row
        delete, since a vacancy may have pipeline events attached that must remain traceable.
      responses:
        '204':
          description: Vacancy archived.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vacancy/{id}/publish:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      operationId: publishVacancy
      tags: [Vacancy]
      summary: Publish a vacancy (DRAFT → PUBLISHED)
      description: >
        Transitions a vacancy from `DRAFT` to `PUBLISHED`. Has a real side effect: the apply-flow
        for this vacancy goes live. Only legal from `DRAFT`.
      responses:
        '200':
          description: Vacancy published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vacancy/{id}/fill:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      operationId: fillVacancy
      tags: [Vacancy]
      summary: Mark a vacancy as filled (PUBLISHED → FILLED)
      description: Only legal from `PUBLISHED`.
      responses:
        '200':
          description: Vacancy marked as filled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vacancy/{id}/close:
    parameters:
      - $ref: '#/components/parameters/VacancyId'
    post:
      operationId: closeVacancy
      tags: [Vacancy]
      summary: Close a vacancy without a hire (cancelled/withdrawn)
      description: >
        Transitions a vacancy to `CLOSED`. Represents a vacancy that is cancelled or withdrawn
        without ever being filled. Only legal from `DRAFT` or `PUBLISHED`.
      responses:
        '200':
          description: Vacancy closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacancyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Multi-tenancy (organization scoping) is derived from this token, never from the request or
        response body.

  parameters:
    VacancyId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/VacancyId'
    GenerationId:
      name: generationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/GenerationId'
    JobTitleFilter:
      name: jobTitle
      in: query
      required: false
      description: Partial, case-insensitive match on job title (`ILIKE`-style).
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      required: false
      description: Filter by one or more statuses.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/VacancyStatus'
    CategoryFilter:
      name: category
      in: query
      required: false
      description: Filter by one or more categories.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/VacancyCategory'
    CreatedFrom:
      name: createdFrom
      in: query
      required: false
      description: Include vacancies created on or after this date.
      schema:
        type: string
        format: date
    CreatedTo:
      name: createdTo
      in: query
      required: false
      description: Include vacancies created on or before this date.
      schema:
        type: string
        format: date
    OpenDaysMin:
      name: openDaysMin
      in: query
      required: false
      description: >
        Minimum number of days the vacancy has been open, derived from `publishedAt` at query time
        (not a stored field).
      schema:
        type: integer
        minimum: 0
    OpenDaysMax:
      name: openDaysMax
      in: query
      required: false
      description: >
        Maximum number of days the vacancy has been open, derived from `publishedAt` at query time
        (not a stored field).
      schema:
        type: integer
        minimum: 0
    ContactPersonName:
      name: contactPersonName
      in: query
      required: false
      description: Free-text match on `contactPerson.name`.
      schema:
        type: string
    SortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
        enum: [createdAt, jobTitle, openDays]
        default: createdAt
    SortDir:
      name: sortDir
      in: query
      required: false
      schema:
        type: string
        enum: [ASC, DESC]
        default: DESC
    Cursor:
      name: cursor
      in: query
      required: false
      description: >
        Opaque keyset-pagination cursor from a previous response's `nextCursor`. Omit to fetch the
        first page.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: The authenticated user does not have the required authorization to perform this action.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: No vacancy exists with the given id.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: The requested status transition is not legal from the vacancy's current status.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      description: An unexpected error occurred while processing the request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    VacancyId:
      type: string
      format: uuid
      readOnly: true

    GenerationId:
      type: string
      format: uuid
      readOnly: true

    VacancyDescriptionGenerationStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]

    VacancyStatus:
      type: string
      enum: [DRAFT, PUBLISHED, FILLED, CLOSED, ARCHIVED]
      description: >
        `CLOSED` represents a vacancy cancelled or withdrawn without a hire. `ARCHIVED` is set by
        soft delete (`DELETE /vacancy/{id}`) and is never set directly by a client.

    VacancyCategory:
      type: string
      description: >
        Internal Jobzy job-function taxonomy.
      enum:
        - ADMINISTRATION
        - CONSTRUCTION
        - CUSTOMER_SUPPORT
        - DESIGN_CREATIVE
        - EDUCATION
        - ENGINEERING
        - FACILITY_SERVICES
        - FINANCE
        - HEALTHCARE
        - HOSPITALITY
        - HUMAN_RESOURCES
        - LEGAL
        - LOGISTICS_SUPPLY_CHAIN
        - MANAGEMENT
        - MARKETING
        - OPERATIONS
        - PRODUCTION_MANUFACTURING
        - RETAIL
        - SALES
        - SCIENCE_RESEARCH
        - OTHER

    WorkplaceType:
      type: string
      enum: [ONSITE, REMOTE, HYBRID]

    SalaryPeriod:
      type: string
      enum: [HOURLY, MONTHLY, ANNUAL]

    Location:
      type: object
      required: [country, city]
      properties:
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          pattern: '^[A-Z]{2}$'
        city:
          type: string
          maxLength: 200

    VacancyDescription:
      type: object
      description: >
        All fields optional and populated incrementally, including via a separate, explicit
        AI-generation endpoint (out of scope for this version) whose suggestions are shown to the
        user for editing and only then submitted here — never generated synchronously inside this
        request.
      properties:
        summary:
          type: string
          maxLength: 500
        jobDescription:
          type: string
          maxLength: 5000
        tasks:
          type: string
          maxLength: 3000
        whatWeOffer:
          type: string
          maxLength: 2000
        aboutUs:
          type: string
          maxLength: 2000

    ContactPerson:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          maxLength: 50
        role:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 20
        email:
          type: string
          format: email

    Offer:
      type: object
      description: >
        `currency` and `salaryPeriod` are required as soon as either `salaryMin` or `salaryMax` is
        present, given the EU multi-country target market. Not enforced at the schema level (kept
        as a plain object for codegen compatibility) — enforce this rule in the application layer.
      properties:
        salaryMin:
          type: [integer, 'null']
        salaryMax:
          type: [integer, 'null']
        currency:
          type: string
          description: ISO 4217 currency code.
          pattern: '^[A-Z]{3}$'
        salaryPeriod:
          $ref: '#/components/schemas/SalaryPeriod'
        numberOfHolidays:
          type: [number, 'null']
          description: >
            Full-time-equivalent holiday days. Never pre-computed/prorated server-side.

    VacancyResponse:
      type: object
      required:
        - id
        - status
        - jobTitle
        - category
        - location
        - workplaceType
        - hoursPerWeek
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/VacancyId'
        status:
          $ref: '#/components/schemas/VacancyStatus'
        jobTitle:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/VacancyCategory'
        location:
          $ref: '#/components/schemas/Location'
        workplaceType:
          $ref: '#/components/schemas/WorkplaceType'
        hoursPerWeek:
          type: number
          description: Hours per week; decimals allowed for part-time roles (e.g. 32.5).
          exclusiveMinimum: 0
        description:
          $ref: '#/components/schemas/VacancyDescription'
        contactPerson:
          $ref: '#/components/schemas/ContactPerson'
        offer:
          $ref: '#/components/schemas/Offer'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        publishedAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
        deletedAt:
          type: [string, 'null']
          format: date-time
          readOnly: true
          description: Set together with `status=ARCHIVED` by soft delete.

    VacancyCoreRequest:
      type: object
      description: Minimum fields to create a vacancy in `DRAFT` status. No `id` — the resource is identified by the URL.
      required: [jobTitle, category, location, workplaceType, hoursPerWeek]
      properties:
        jobTitle:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/VacancyCategory'
        location:
          $ref: '#/components/schemas/Location'
        workplaceType:
          $ref: '#/components/schemas/WorkplaceType'
        hoursPerWeek:
          type: number
          exclusiveMinimum: 0
          maximum: 60

    VacancyDescriptionRequest:
      allOf:
        - $ref: '#/components/schemas/VacancyDescription'

    VacancyDescriptionGeneration:
      type: object
      description: >
        Status of an asynchronous description-generation job started via
        `POST /vacancy/{id}/generate-description`. `description` is populated only once `status`
        is `COMPLETED`; absent while `PENDING`, and absent (with the failure detail returned
        instead as a problem response) if `FAILED`.
      required: [generationId, status]
      properties:
        generationId:
          $ref: '#/components/schemas/GenerationId'
        status:
          $ref: '#/components/schemas/VacancyDescriptionGenerationStatus'
        description:
          $ref: '#/components/schemas/VacancyDescription'

    GenerateVacancyDescriptionRequest:
      type: object
      description: >
        Short inputs used to generate an AI-assisted `description` draft for an existing vacancy
        (`POST /vacancy/{id}/generate-description`). The result is a suggestion only, shown to the
        user for editing before being submitted via `PATCH /vacancy/{id}`.
      required: [mostImportantTasks, team, whyNiceJob]
      properties:
        mostImportantTasks:
          type: string
          maxLength: 1000
          description: The most important day-to-day tasks for this role.
        team:
          type: string
          maxLength: 1000
          description: Description of the team the candidate will join.
        whyNiceJob:
          type: string
          maxLength: 1000
          description: Why this is a compelling job to candidates.

    VacancyOfferRequest:
      type: object
      description: >
        Contact person and offer details, captured together as they are entered in the same FE
        stage. No `id`. Not referenced directly by `PATCH /vacancy/{id}` — `VacancyUpdateRequest`
        exposes `contactPerson` and `offer` as independent optional sections instead, per JSON
        Merge Patch semantics — but documents the shape of that combined FE-stage payload.
      required: [contactPerson, offer]
      properties:
        contactPerson:
          $ref: '#/components/schemas/ContactPerson'
        offer:
          $ref: '#/components/schemas/Offer'

    VacancyUpdateRequest:
      type: object
      description: >
        JSON Merge Patch (RFC 7396) body for `PATCH /vacancy/{id}`. Every section is optional and
        independent — send only the section(s) you have. No `id` field; the resource is identified
        by the URL path.
      properties:
        jobTitle:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/VacancyCategory'
        location:
          $ref: '#/components/schemas/Location'
        workplaceType:
          $ref: '#/components/schemas/WorkplaceType'
        hoursPerWeek:
          type: number
          exclusiveMinimum: 0
        description:
          $ref: '#/components/schemas/VacancyDescriptionRequest'
        contactPerson:
          $ref: '#/components/schemas/ContactPerson'
        offer:
          $ref: '#/components/schemas/Offer'

    VacancyListResponse:
      type: object
      required: [items, totalVacancies, vacanciesMatchingCriteria, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VacancyResponse'
        totalVacancies:
          type: integer
        vacanciesMatchingCriteria:
          type: integer
        nextCursor:
          type: [string, 'null']
          description: >
            Opaque cursor for the next page, to be echoed back via the `cursor` query parameter.
            `null` when this is the last page.



    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs.
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          description: Extension member listing field-level validation failures, when applicable.
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
